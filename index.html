<div class="layout collapsed" id="layout">
  <main class="grid-wrap">
    <h1 class="sr-only">gh.pin</h1>
    <div class="filter" id="filter"></div>
    <div class="grid" id="grid">
      <div class="card add-tile" id="addTile">
        <form class="add" id="addForm">
          <input id="addInput" aria-label="add a pin: paste a github url or owner/repo" placeholder="paste a github url or owner/repo" autocomplete="off" spellcheck="false">
        </form>
      </div>
    </div>
    <div class="empty-state" id="emptyState" hidden>
      <img class="logo" src="/logo.png" alt="gh.pin logo" width="240" height="263">
      <div class="brand">gh.pin</div>
      <p>paste a github url anywhere (<kbd>cmd</kbd>+<kbd>v</kbd>) and it lands as a tile</p>
    </div>
    <footer class="footer" id="footer"></footer>
  </main>

  <aside class="sidebar" id="sidebar">
    <button class="sb-hint" id="sbHint" type="button" aria-label="collapse panel"><kbd>esc</kbd></button>
    <button class="sb-close" id="sbClose" type="button" aria-label="close panel">
      <svg width="14" height="14"><use href="#i-x"/></svg>
    </button>
    <div class="sb-content" id="sbContent">
      <p class="sb-empty" id="sbEmpty">click a card to read</p>
    </div>
  </aside>
</div>


<template id="t-card">
  <article class="card" data-id="">
    <div class="hero">
      <img data-hero alt="" loading="lazy" draggable="false">
      <button class="cover-nav prev" data-cover-prev type="button" aria-label="previous cover" title="previous cover">
        <svg width="12" height="12" style="transform:rotate(180deg)"><use href="#i-chev"/></svg>
      </button>
      <button class="cover-nav next" data-cover-next type="button" aria-label="next cover" title="next cover">
        <svg width="12" height="12"><use href="#i-chev"/></svg>
      </button>
    </div>
    <div class="card-actions">
      <button data-card-act="refresh" type="button" aria-label="refresh" data-tip="refresh"><svg width="12" height="12"><use href="#i-sync"/></svg></button>
      <button data-card-act="details" type="button" aria-label="details" data-tip="details"><svg width="12" height="12"><use href="#i-chart"/></svg></button>
      <button data-card-act="open" type="button" aria-label="open on github" data-tip="open on github"><svg width="12" height="12"><use href="#i-ext"/></svg></button>
      <button data-card-act="unpin" type="button" aria-label="unpin" data-tip="unpin"><svg width="12" height="12"><use href="#i-x"/></svg></button>
    </div>
    <div class="body">
      <div class="path-row">
        <span class="path"><span class="o" data-owner></span><span data-repo></span></span>
        <span class="age tip tip-r"><span class="dot" data-dot></span> <span class="k">commit</span> <span data-age></span></span>
      </div>
      <div class="row">
        <p class="desc" data-desc></p>
        <div class="spark tip tip-r">
          <svg viewBox="0 0 200 22" preserveAspectRatio="none" data-spark></svg>
          <div class="spark-meta">
            <span class="k spark-k"><svg width="8" height="8"><use href="#i-star"/></svg><span data-spark-label></span></span>
            <span class="growth" data-growth></span>
          </div>
        </div>
      </div>
      <div class="icons">
        <span class="it"><svg width="12" height="12"><use href="#i-star"/></svg> <span data-stars></span><span class="fire tip" data-fire hidden></span></span>
        <span class="it"><svg width="12" height="12"><use href="#i-fork"/></svg> <span data-forks></span></span>
        <span class="it"><svg width="12" height="12"><use href="#i-pr"/></svg> <span data-prs></span></span>
      </div>
      <div class="rel-line tip" data-rel-line hidden>
        <svg class="rel-ic" width="11" height="11"><use href="#i-tag"/></svg>
        <span class="rel-tag" data-rel-tag></span>
        <span class="rel-when" data-rel-when></span>
        <span class="rel-new" data-rel-new hidden>new</span>
      </div>
      <div class="tags-row">
        <div class="tags" data-tags></div>
        <button class="edit-btn" data-edit type="button" aria-label="edit tags">
          <svg width="11" height="11"><use href="#i-pencil"/></svg>
        </button>
      </div>
    </div>
  </article>
</template>

<template id="t-sidebar-default">
  <div class="prose readme-prose" data-readme></div>
  <div class="detail" data-detail>
    <div class="section">
      <h2>star history</h2>
      <svg class="bigspark" viewBox="0 0 300 56" preserveAspectRatio="none" data-bigspark></svg>
      <p class="note" data-history-note hidden></p>
    </div>
    <div class="section">
      <h2>activity</h2>
      <pre class="kv" data-activity></pre>
    </div>
    <div class="section" data-sec-rel>
      <h2>releases</h2>
      <div class="rel-mini" data-rel-mini></div>
    </div>
    <div class="section" data-sec-snaps>
      <h2>snapshots</h2>
      <pre class="kv" data-snaps></pre>
    </div>
  </div>
</template>

<script type="module" src="/src/app.ts"></script>
</body>
</html>
